name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Setup Forge workspace
        run: |
          set -o pipefail
          ./gradlew setupDecompWorkspace --no-daemon 2>&1 | tee setup.log
        env:
          GRADLE_OPTS: "-Xmx3G"

      - name: Build
        run: |
          set -o pipefail
          ./gradlew build --no-daemon 2>&1 | tee build.log
        env:
          GRADLE_OPTS: "-Xmx3G"

      - name: Collect error.txt on failure
        if: failure()
        run: |
          {
            echo "=== NXClient Build Error ==="
            echo "Date    : $(date -u)"
            echo "Commit  : ${{ github.sha }}"
            echo "Branch  : ${{ github.ref_name }}"
            echo "Run URL : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""

            if [ -f setup.log ]; then
              echo "====== setupDecompWorkspace output ======"
              cat setup.log
              echo ""
            fi

            if [ -f build.log ]; then
              echo "====== Build output ======"
              cat build.log
              echo ""
              echo "====== Java compiler errors ======"
              grep -E "\.java:[0-9]+: error:" build.log || echo "(no javac errors)"
              echo ""
              echo "====== Exceptions / BUILD FAILED ======"
              grep -A 15 "Exception\|BUILD FAILED\|FAILURE:" build.log | head -80 || echo "(none)"
            fi
          } > error.txt

      - name: Upload error.txt on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error
          path: error.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NXClient-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Upload to Release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
